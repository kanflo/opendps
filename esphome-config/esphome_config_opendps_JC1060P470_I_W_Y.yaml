                                    mode: TEXT_LOWER
                          - keyboard:
                              id: fw_keyboard
                              width: 760
                              height: 220
                              textarea: fw_url_input
                              mode: TEXT_LOWER
                              bg_color: 0x222222
                              text_color: 0xEEEEEE
                          - obj:
                              width: 760
                              height: 44
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              scrollbar_mode: "off"
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: END
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - button:
                                    width: 140
                                    height: 44
                                    bg_color: 0x333333
                                    radius: 6
                                    on_click:
                                      - lvgl.widget.hide: fw_url_overlay
                                    widgets:
                                      - label:
                                          align: CENTER
                                          text: "Cancel"
                                          text_color: 0xCCCCCC
                                          text_font: montserrat_16
                                - button:
                                    width: 140
                                    height: 44
                                    bg_color: 0x2A4A2A
                                    border_color: 0x39FF14
                                    border_width: 2
                                    radius: 6
                                    on_click:
                                      - lambda: |-
                                          const char *url = lv_textarea_get_text(id(fw_url_input));
                                          if (url == nullptr || url[0] == '\0') return;
                                          id(g_fw_url) = url;
                                          id(g_fw_selected) = url;
                                          lv_label_set_text(id(fw_selected_lbl), url);
                                          lv_obj_clear_state(id(fw_flash_btn), LV_STATE_DISABLED);
                                      - lvgl.widget.hide: fw_url_overlay
                                    widgets:
                                      - label:
                                          align: CENTER
                                          text: "OK"
                                          text_color: 0x39FF14
                                          text_font: montserrat_16

              # ==============================================================
              # CONFIRM OVERLAY
              # ==============================================================
              - obj:
                  id: fw_confirm_overlay
                  hidden: true
                  x: 0
                  y: 0
                  width: 860
                  height: 460
                  bg_color: 0x000000
                  bg_opa: 90%
                  border_width: 0
                  radius: 0
                  scrollbar_mode: "off"
                  widgets:
                    - obj:
                        x: 130
                        y: 90
                        width: 600
                        height: 280
                        bg_color: 0x1C1C1C
                        border_color: 0xFFAA22
                        border_width: 2
                        radius: 10
                        pad_all: 20
                        scrollbar_mode: "off"
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: SPACE_BETWEEN
                          flex_align_cross: STRETCH
                          pad_row: 12
                        widgets:
                          - label:
                              text: "Confirm firmware flash"
                              text_color: 0xFFAA22
                              text_font: montserrat_20
                              align: CENTER
                          - label:
                              text: "The device will be reprogrammed.\nDo NOT power off during the process."
                              text_color: 0xCCCCCC
                              text_font: montserrat_16
                              align: CENTER
                          - label:
                              id: fw_confirm_file
                              text: ""
                              text_color: 0xAAAAAA
                              text_font: montserrat_14
                              long_mode: DOT
                              align: CENTER
                          - obj:
                              width: 560
                              height: 50
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              scrollbar_mode: "off"
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_EVENLY
                                flex_align_cross: CENTER
                              widgets:
                                - button:
                                    width: 200
                                    height: 44
                                    bg_color: 0x333333
                                    radius: 6
                                    on_click:
                                      - lvgl.widget.hide: fw_confirm_overlay
                                    widgets:
                                      - label:
                                          align: CENTER
                                          text: "Cancel"
                                          text_color: 0xCCCCCC
                                          text_font: montserrat_16
                                - button:
                                    width: 200
                                    height: 44
                                    bg_color: 0x4A2A2A
                                    border_color: 0xFF4444
                                    border_width: 2
                                    radius: 6
                                    on_click:
                                      - lvgl.widget.hide: fw_confirm_overlay
                                      - script.execute: fw_flash
                                    widgets:
                                      - label:
                                          align: CENTER
                                          text: "Start flash"
                                          text_color: 0xFF4444
                                          text_font: montserrat_16

              # ==============================================================
              # PROGRESS OVERLAY
              # ==============================================================
              - obj:
                  id: fw_progress_overlay
                  hidden: true
                  x: 0
                  y: 0
                  width: 860
                  height: 460
                  bg_color: 0x000000
                  bg_opa: 90%
                  border_width: 0
                  radius: 0
                  scrollbar_mode: "off"
                  widgets:
                    - obj:
                        x: 30
                        y: 50
                        width: 800
                        height: 360
                        bg_color: 0x1C1C1C
                        border_color: 0x39FF14
                        border_width: 2
                        radius: 10
                        pad_all: 20
                        scrollbar_mode: "off"
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: SPACE_BETWEEN
                          flex_align_cross: STRETCH
                          pad_row: 16
                        widgets:
                          - label:
                              text: "Flashing firmware..."
                              text_color: 0x39FF14
                              text_font: montserrat_20
                              align: CENTER
                          - spinner:
                              width: 60
                              height: 60
                              align: CENTER
                              indicator:
                                arc_color: 0x39FF14
                                arc_width: 6
                          - label:
                              id: fw_progress_status
                              text: "Uploading..."
                              text_color: 0xCCCCCC
                              text_font: montserrat_16
                              align: CENTER
                          - bar:
                              id: fw_progress_bar
                              width: 760
                              height: 20
                              min_value: 0
                              max_value: 100
                              value: 0
                              bg_color: 0x222222
                              indicator:
                                bg_color: 0x39FF14
                          - button:
                              id: fw_progress_close
                              width: 200
                              height: 44
                              align: CENTER
                              bg_color: 0x333333
                              radius: 6
                              state:
                                disabled: true
                              on_click:
                                - lvgl.widget.hide: fw_progress_overlay
                                - globals.set:
                                    id: g_fw_flashing
                                    value: "false"
                              widgets:
                                - label:
                                    align: CENTER
                                    text: "Close"
                                    text_color: 0xCCCCCC
                                    text_font: montserrat_16

        # ==============================================================
