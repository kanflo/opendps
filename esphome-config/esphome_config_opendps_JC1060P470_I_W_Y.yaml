esphome:
  name: esp32-p4-tab7
  friendly_name: 7inch-tab
  on_boot:
    - priority: 1
      then:
        - lambda: |-
            id(opendps_id).set_upgrade_progress_callback([](uint8_t pct) {
              id(g_fw_progress) = pct;
              id(fw_poll_status).execute();
            });
            id(opendps_id).set_upgrade_complete_callback([](bool ok, const char *msg) {
              id(g_fw_flashing) = false;
              id(g_fw_status) = msg;
              id(g_fw_progress) = ok ? 100 : id(g_fw_progress);
              lv_bar_set_value(id(fw_progress_bar), id(g_fw_progress), LV_ANIM_OFF);
              lv_label_set_text(id(fw_progress_status), msg);
              lv_obj_set_style_bg_color(id(fw_progress_bar), ok ? lv_color_hex(0x39FF14) : lv_color_hex(0xFF3333), LV_PART_INDICATOR);
              lv_obj_clear_state(id(fw_progress_close), LV_STATE_DISABLED);
            });

esp32:
  variant: ESP32P4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
      disable_vfs_support_dir: False
      disable_vfs_support_select: False
      disable_vfs_support_termios: False
    sdkconfig_options:
      CONFIG_FATFS_VOLUME_COUNT: "4"
      CONFIG_FATFS_LFN_NONE: "n"
      CONFIG_FATFS_FS_LOCK: "y"
      CONFIG_FATFS_MAX_LFN: "255"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_API_ENCODING_UTF_8: "y"
      CONFIG_FATFS_ALLOC_PREFER_EXTRAM: "y"
      CONFIG_FATFS_ALLOC_PREFER_ALIGNED_WORK_BUFFERS: "y"
      CONFIG_FATFS_PER_FILE_CACHE: "y"
      CONFIG_FATFS_CODEPAGE_DYNAMIC: "y"
      CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_TASK_LOOP_STACK_SIZE: "16384"

external_components:
  - source: github://p1ngb4ck/esphome@dev
    components: [esp32, http_file_browser, nfs_client, opendps, storage, sd_storage, uart, usb_audio, usb_host, usb_uart, usb_storage]
    refresh: 0s
  - source: github://youkorr/lvgl_9.5
    components: [font, image, lvgl]
    refresh: 0s

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200
  logs:
    usb_host: DEBUG
    usb_client: DEBUG
    usb_device: DEBUG
    usb_uart: DEBUG
    sd_storage: DEBUG
    storage: DEBUG
    opendps: INFO

psram:
