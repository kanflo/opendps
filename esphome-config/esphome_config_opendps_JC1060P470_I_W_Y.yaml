  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

time:
  - platform: host
    id: host_time
    timezone: Europe/Berlin
    update_interval: 100ms
    on_time:
      - seconds: /1
        then:
          - lambda: |-
              auto t = id(rx8130_time).now();
              if (!t.is_valid()) return;
              if (t.second != 0 && lv_label_get_text(id(lbl_status_time))[0] != '-') return;
              char buf[32];
              switch (id(g_datetime_fmt)) {
                case 1: snprintf(buf, sizeof(buf), "%02d:%02d:%02d", t.hour, t.minute, t.second); break;
                case 2: snprintf(buf, sizeof(buf), "%02d.%02d.%04d %02d:%02d", t.day_of_month, t.month, t.year, t.hour, t.minute); break;
                case 3: snprintf(buf, sizeof(buf), "%02d/%02d/%04d %02d:%02d", t.month, t.day_of_month, t.year, t.hour, t.minute); break;
                case 4: snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d", t.year, t.month, t.day_of_month, t.hour, t.minute); break;
                default: snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute); break;
              }
              lv_label_set_text(id(lbl_status_time), buf);
  - platform: rx8130
    id: rx8130_time
    update_interval: 3h
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    on_time_sync:
      then:
        # Write time to RTC
        - rx8130.write_time:
            id: rx8130_time

