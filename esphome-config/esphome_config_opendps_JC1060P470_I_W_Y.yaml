switch:
  - platform: template
    name: "OpenDPS Output"
    id: dps_output_switch
    icon: "mdi:power"
    lambda: |-
      return id(dps_output_sensor_id).state;
    turn_on_action:
      - opendps.enable_output:
          id: opendps_id
          enable: true
    turn_off_action:
      - opendps.enable_output:
          id: opendps_id
          enable: false
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 30
  - platform: template
    name: "Lock OpenDPS"
    id: dps_lock_switch
    icon: "mdi:lock"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - opendps.lock:
          id: opendps_id
          locked: true
    turn_off_action:
      - opendps.lock:
          id: opendps_id
          locked: false
    on_state:
      - globals.set:
          id: g_locked
          value: !lambda 'return x;'
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update:
                id: btn_lock
                bg_color: 0x3A1A00
                bg_opa: COVER
                border_color: 0xFF8800
                border_width: 2
            - lvgl.label.update:
                id: lbl_lock
                text_color: 0xFF8800
          else:
            - lvgl.widget.update:
                id: btn_lock
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.label.update:
                id: lbl_lock
                text_color: 0x444444
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 20
  - platform: template
    name: "Log to File"
    id: datalogger_switch
    icon: "mdi:content-save"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - opendps.start_datalog:
          id: opendps_id
    turn_off_action:
      - opendps.stop_datalog:
          id: opendps_id
    on_state:
      - globals.set:
          id: g_logging
          value: !lambda 'return x;'
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update:
                id: btn_log
                bg_color: 0x00243A
                bg_opa: COVER
                border_color: 0x00AAFF
                border_width: 2
            - lvgl.label.update:
                id: lbl_log
                text_color: 0x00AAFF
          else:
            - lvgl.widget.update:
                id: btn_log
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.label.update:
                id: lbl_log
                text_color: 0x444444
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 70
  - platform: gpio
    pin: GPIO11  # PA-CTRL
    name: "Speaker enable"
    restore_mode: ALWAYS_ON
    id: speaker_enable_switch
    inverted: False
  - platform: template
    name: "Ring Timer"
    id: timer_ringing
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Stop playing the alarm
      - media_player.stop:
          id: speaker_media_player_id
          announcement: true
    on_turn_on:
      - while:
          condition:
            switch.is_on: timer_ringing
          then:
            # Play the alarm sound as an announcement
            - media_player.speaker.play_on_device_media_file:
                id: speaker_media_player_id
                media_file: alarm_sound
                announcement: true
            # Wait until the alarm sound starts playing
            - wait_until:
                media_player.is_announcing:
                  id: speaker_media_player_id
            # Wait until the alarm sound stops playing
            - wait_until:
                not:
                  media_player.is_announcing:
                    id: speaker_media_player_id

audio_dac:
  - platform: es8311
    id: es8311_codec
    i2c_id: i2c_bus_a
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 44100
    use_mclk: True
    use_microphone: True
    mic_gain: 24DB

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12
    i2s_mclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: external_mic
    i2s_audio_id: i2s_output
    i2s_mode: primary
    adc_type: external
    i2s_din_pin: GPIO48
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    id: speaker_id
    i2s_dout_pin: GPIO09
    dac_type: external
    sample_rate: 44100
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_codec
    buffer_duration: 1000ms
    i2s_mode: primary
  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    num_channels: 1
    task_stack_in_psram: True
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input
  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input
  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Speaker Media Player"
    id: speaker_media_player_id
    task_stack_in_psram: True
    buffer_size: 1000000
    codec_support_enabled: True
    volume_initial: 70%
    volume_max: 70%
    announcement_pipeline:
      speaker: announcement_spk_resampling_input
      sample_rate: 44100
      num_channels: 1
    files:
      - id: alarm_sound
        file: testsound.flac
      - id: wake_sound_file
        file: 'sounds/timer_finished.flac'

mqtt:
  broker: vmzone.duckdns.org
  username: tab7
  password: !secret mqtt_password_tab7
  discover_ip: True
  discovery: True

http_file_browser:
  id: filebrowser
  storage_id: storage_id
  root_path: "/"
  url_prefix: "/files"
  auth_enabled: true
  username: !secret file_browser_username
  password: !secret file_browser_password
  enable_upload: True
  enable_deletion: True

web_server:
  id: webserver_id
  version: 3
  sorting_groups:
    - id: opendps_sensors
      name: "OpenDPS sensors"
      sorting_weight: 10
    - id: opendps_control
      name: "OpenDPS control"
      sorting_weight: 20
    - id: esphome_device_control
      name: "ESPHome device controls"
      sorting_weight: 30

opendps:
  id: opendps_id
  uart_id: uart1_id
  update_interval: 50ms
  default_brightness: 80
  bootloader_baud_rate: 19200
  bootloader_legacy: true
  tcp_bridge:
    tcp_bridge_port: 5005
    tcp_bridge_disconnect_delay: 1s
    tcp_bridge_frame_timeout: 500ms
  calibration_backup:
    calibration_backup_path: "/sdcard/opendps_calibration.cfg"
    calibration_auto_restore: true
  on_connect:
    - script.execute: opendps_on_connect_init
    - lambda: |-
        // Voltage and current set values
        id(voltage_number).make_call().set_value(id(opendps_id).get_voltage_setting()).perform();
        id(current_number).make_call().set_value(id(opendps_id).get_current_setting()).perform();

        // Output mode (function: cv / cc / cl)
        auto func = id(opendps_id).get_data().cur_func;
        if (!func.empty())
          id(opendps_select_mode).make_call().set_option(func).perform();

        // Output enabled state - set global only, LVGL done below
        id(g_output_on) = id(opendps_id).get_data().output_enabled;

        // Brightness
        id(display_backlight).make_call().set_brightness(id(opendps_id).get_brightness_setting() / 100.0f).perform();

  datalogger:
    storage_path: "/sdcard/logs"
    filename_format: "dps_%Y%m%d_%H%M%S.csv"
    buffer_size: 1048576
    format: csv
    time_id: host_time
    columns:
      - system_time
      - elapsed_ms
      - voltage_in
      - voltage_out
      - current_out
      - power_out
      - output_enabled
    flush_interval: 10s

select:
  - platform: template
    id: opendps_select_mode
    name: "Select output mode"
    optimistic: true
    icon: mdi:cog-outline
    options:
      - "cv"
      - "cc"
      - "cl"
    set_action:
      - lambda: |-
          id(opendps_id).set_function(x.c_str());
    on_value:
      - if:
          condition:
            lambda: 'return i == 0;'
          then:
            - lvgl.widget.update:
                id: btn_cv
                bg_color: 0x1A4A1A
                bg_opa: COVER
                border_color: 0x39FF14
                border_width: 3
            - lvgl.widget.update:
                id: btn_cc
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.widget.update:
                id: btn_cp
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.label.update:
                id: lbl_cv
                text_color: 0x39FF14
            - lvgl.label.update:
                id: lbl_cc
                text_color: 0x444444
            - lvgl.label.update:
                id: lbl_cp
                text_color: 0x444444
      - if:
          condition:
            lambda: 'return i == 1;'
          then:
            - lvgl.widget.update:
                id: btn_cc
                bg_color: 0x3A3A00
                bg_opa: COVER
                border_color: 0xFFBF00
                border_width: 3
            - lvgl.widget.update:
                id: btn_cv
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.widget.update:
                id: btn_cp
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.label.update:
                id: lbl_cc
                text_color: 0xFFBF00
            - lvgl.label.update:
                id: lbl_cv
                text_color: 0x444444
            - lvgl.label.update:
                id: lbl_cp
                text_color: 0x444444
      - if:
          condition:
            lambda: 'return i == 2;'
          then:
            - lvgl.widget.update:
                id: btn_cp
                bg_color: 0x3A0A0A
                bg_opa: COVER
                border_color: 0xFF3333
                border_width: 3
            - lvgl.widget.update:
                id: btn_cv
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.widget.update:
                id: btn_cc
                bg_color: 0x0A0A0A
                bg_opa: COVER
                border_color: 0x1A1A1A
                border_width: 0
            - lvgl.label.update:
                id: lbl_cp
                text_color: 0xFF3333
            - lvgl.label.update:
                id: lbl_cv
                text_color: 0x444444
            - lvgl.label.update:
                id: lbl_cc
                text_color: 0x444444
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 40
  - id: change_baud_rate
    name: "OpenDPS serial connection baudrate"
    platform: template
    options:
      - "2400"
      - "9600"
      - "19200"
      - "38400"
      - "57600"
      - "115200"
      - "256000"
      - "512000"
      - "921600"
    initial_option: "57600"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(opendps_id).set_uart_baud(std::stoul(x.c_str()));
          id(uart1_id).flush();
          uint32_t new_baud_rate = stoi(x);
          ESP_LOGD("change_baud_rate", "Changing baud rate from %i to %i",id(uart1_id).get_baud_rate(),
                   new_baud_rate);
          if (id(uart1_id).get_baud_rate() != new_baud_rate) {
            id(uart1_id).set_baud_rate(new_baud_rate);
            id(uart1_id).load_settings();
          }
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 70

text:
  # Single input field for ALL calibration assistant steps.
  # Enter your measurement value here, then press "Calibration Step" to submit.
  - platform: template
    name: "Calibration Input"
    id: cal_input
    mode: text
    optimistic: true
    initial_value: "0"
  - platform: template
    mode: TEXT
    name: "OpenDPS firmware path"
    icon: mdi:file-send-outline
    id: opendps_fw_path_input
    optimistic: True
    on_value:
      then:
        - lambda:
            id(opendps_firmware_path) = x;
            return;
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 110
  - platform: template
    name: "Cal: V_ADC_K"
    id: input_v_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_ADC_C"
    id: input_v_adc_c
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_DAC_K"
    id: input_v_dac_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_DAC_C"
    id: input_v_dac_c
    mode: text
    optimistic: true

  # --- Current Calibration ---
  - platform: template
    name: "Cal: A_ADC_K"
    id: input_a_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_ADC_C"
    id: input_a_adc_c
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_DAC_K"
    id: input_a_dac_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_DAC_C"
    id: input_a_dac_c
    mode: text
    optimistic: true

  # --- Input Voltage Calibration ---
  - platform: template
    name: "Cal: VIN_ADC_K"
    id: input_vin_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: VIN_ADC_C"
    id: input_vin_adc_c
    mode: text
    optimistic: true

  # --- Calibration Assistant Parameters ---
  - platform: template
    name: "Cal Assist: Vin Low (mV)"
    id: input_vin_low
    mode: text
    optimistic: true
    initial_value: "12000"
    on_value:
      - lambda: |-
          id(cal_vin_low_mv) = atof(x.c_str());
          ESP_LOGI("cal", "Vin LOW set to: %.0f mV", id(cal_vin_low_mv));

  - platform: template
    name: "Cal Assist: Vin High (mV)"
    id: input_vin_high
    mode: text
    optimistic: true
    initial_value: "48000"
    on_value:
      - lambda: |-
          id(cal_vin_high_mv) = atof(x.c_str());
          ESP_LOGI("cal", "Vin HIGH set to: %.0f mV", id(cal_vin_high_mv));

  - platform: template
    name: "Cal Assist: Load Resistance (Ohm)"
    id: input_load_resistance
    mode: text
    optimistic: true
    initial_value: "10.0"
    on_value:
      - lambda: |-
          id(cal_load_resistance) = atof(x.c_str());
          ESP_LOGI("cal", "Load resistance set to: %.2f Ohm", id(cal_load_resistance));

  - platform: template
    name: "Cal Assist: Load Max Wattage (W)"
    id: input_load_wattage
    mode: text
    optimistic: true
    initial_value: "50.0"
    on_value:
      - lambda: |-
          id(cal_load_max_wattage) = atof(x.c_str());
          ESP_LOGI("cal", "Load max wattage set to: %.1f W", id(cal_load_max_wattage));

  - platform: template
    name: "Cal Assist: Max DPS Current (A)"
    id: input_max_current
    mode: text
    optimistic: true
    initial_value: "5.0"
    on_value:
      - lambda: |-
          id(cal_max_dps_current) = atof(x.c_str());
          ESP_LOGI("cal", "Max DPS current set to: %.1f A", id(cal_max_dps_current));

  # --- Backup Path ---
  - platform: template
    name: "Calibration Backup Path"
    id: input_backup_path
    mode: text
    optimistic: true
    initial_value: "/sdcard/opendps_calibration.cfg"
    on_value:
      - lambda: |-
          id(cal_backup_path) = x;
          ESP_LOGI("cal", "Backup path: %s", x.c_str());

binary_sensor:
  - platform: opendps
    opendps_id: opendps_id
    output_enabled:
      id: dps_output_sensor_id
      name: "OpenDPS Output Enabled"
      icon: mdi:meter-electric-outline
      on_state:
        - globals.set:
            id: g_output_on
            value: !lambda 'return x;'
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.widget.update:
                  id: pwr_ring
                  border_color: 0x39FF14
                  shadow_color: 0x39FF14
                  shadow_width: 16
              - lambda: |-
                  lv_obj_add_flag(id(lbl_pwr_off), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_clear_flag(id(lbl_pwr_on), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_set_style_text_color(id(lbl_pwr_on), lv_color_hex(0x39FF14), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_pwr_icon), lv_color_hex(0x39FF14), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_vout), lv_color_hex(0x39FF14), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_iout), lv_color_hex(0x4499FF), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_setv), lv_color_hex(0x1A4A1A), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_seti), lv_color_hex(0x1A1A4A), LV_PART_MAIN);
            else:
              - lvgl.widget.update:
                  id: pwr_ring
                  border_color: 0x555555
                  shadow_color: 0x000000
                  shadow_width: 0
              - lambda: |-
                  lv_obj_clear_flag(id(lbl_pwr_off), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_add_flag(id(lbl_pwr_on), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_set_style_text_color(id(lbl_pwr_off), lv_color_hex(0x555555), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_pwr_icon), lv_color_hex(0x555555), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_vout), lv_color_hex(0x2A2A2A), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_iout), lv_color_hex(0x2A2A2A), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_setv), lv_color_hex(0x39FF14), LV_PART_MAIN);
                  lv_obj_set_style_text_color(id(lbl_seti), lv_color_hex(0x4499FF), LV_PART_MAIN);
      web_server:
        sorting_group_id: opendps_sensors
        sorting_weight: 10
    connected:
      id: dps_connected_sensor_id
      name: "OpenDPS Connected"
      icon: mdi:power-plug
      on_state:
        - lambda: |-
            lv_obj_set_style_text_color(id(lbl_icon_dps), x ? lv_color_hex(0x39FF14) : lv_color_hex(0x333333), LV_PART_MAIN);

  - platform: template
    id: bs_ha_connected
    name: "HA⁄MQTT Connected"
    lambda: |-
      bool api_ok = global_api_server != nullptr && global_api_server->is_connected();
      bool mqtt_ok = mqtt::global_mqtt_client != nullptr && mqtt::global_mqtt_client->is_connected();
      return api_ok || mqtt_ok;
    on_state:
      - lambda: |-
          lv_obj_set_style_text_color(id(lbl_icon_ha), x ? lv_color_hex(0x44AAFF) : lv_color_hex(0x333333), LV_PART_MAIN);

  - platform: template
    id: bs_sd_mounted
    name: "SD Card Mounted"
    lambda: 'return id(sd_card).is_mounted();'
    on_state:
      - lambda: |-
          lv_obj_set_style_text_color(id(lbl_icon_sd), x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);

  - platform: template
    id: bs_usb_mounted
    name: "USB Mounted"
    lambda: 'return id(usb_storage_1).is_mounted();'
    on_state:
      - lambda: |-
          lv_obj_set_style_text_color(id(lbl_icon_usb), x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);

  - platform: template
    id: bs_nfs_mounted
    name: "NFS Mounted"
    lambda: 'return id(nfs_share).is_mounted();'
    on_state:
      - lambda: |-
          lv_obj_set_style_text_color(id(lbl_icon_nfs), x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);

text_sensor:
  - platform: template
    name: "Calibration Status"
    id: cal_status
    update_interval: 1s
    lambda: |-
      auto state = id(opendps_id).get_calibration_assistant_state();
      if (state == opendps::CAL_IDLE) {
        return std::string("Idle - Ready to calibrate");
      }
      return std::string("Busy");

button:
  # --- Start Calibration Assistant ---
  # This begins the guided calibration process.
  # Follow the prompts in the logs (INFO level).
  - platform: template
    name: "Start Calibration Assistant"
    on_press:
      - logger.log:
          level: INFO
          format: "Starting calibration assistant..."
      - opendps.start_calibration_assistant:
          id: opendps_id

  # --- Submit Value and Advance to Next Step ---
  # Enter your measurement in the "Calibration Input" field,
  # then press this button to submit and advance.
  - platform: template
    name: "Calibration Step"
    on_press:
      - lambda: |-
          float val = atof(id(cal_input).state.c_str());
          ESP_LOGI("cal", "Submitting calibration value: %.3f", val);
      - opendps.calibration_assistant_step:
          id: opendps_id
          measured_value: !lambda "return atof(id(cal_input).state.c_str());"
  - platform: factory_reset
    name: "Restart with Factory Default Settings"
  - platform: template
    name: "OpenDPS Upgrade Firmware"
    icon: mdi:upload-network-outline
    on_press:
      - lambda: |-
          std::string fw_path = id(opendps_firmware_path);
          id(opendps_id).start_firmware_upgrade(fw_path);
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 120
  - platform: template
    name: "Ping Device"
    icon: mdi:cast-connected
    on_press:
      - lambda: |-
          id(opendps_id).send_ping();
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 90
  - platform: template
    name: "Request Version"
    icon: mdi:tooltip-question-outline
    on_press:
      - lambda: |-
          id(opendps_id).request_version();
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 100
  # --- Request/Refresh Calibration Values ---
  - platform: template
    name: "Request Calibration Report"
    on_press:
      - opendps.request_calibration_report:
          id: opendps_id
      - delay: 500ms
      - lambda: |-
          // Update text inputs with current values
          auto &cal = id(opendps_id).get_calibration_data();
          char buf[32];
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_k);
          id(input_v_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_c);
          id(input_v_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_k);
          id(input_v_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_c);
          id(input_v_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_k);
          id(input_a_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_c);
          id(input_a_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_k);
          id(input_a_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_c);
          id(input_a_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_k);
          id(input_vin_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_c);
          id(input_vin_adc_c).publish_state(buf);
          ESP_LOGI("cal", "Updated text inputs with current calibration values");

  # --- Set All Calibration Parameters ---
  - platform: template
    name: "Set All Calibration"
    on_press:
      - lambda: |-
          ESP_LOGI("cal", "Setting all calibration parameters from text inputs");
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_ADC_K"
          calibration_value: !lambda "return atof(id(input_v_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_ADC_C"
          calibration_value: !lambda "return atof(id(input_v_adc_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_DAC_K"
          calibration_value: !lambda "return atof(id(input_v_dac_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_DAC_C"
          calibration_value: !lambda "return atof(id(input_v_dac_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_ADC_K"
          calibration_value: !lambda "return atof(id(input_a_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_ADC_C"
          calibration_value: !lambda "return atof(id(input_a_adc_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_DAC_K"
          calibration_value: !lambda "return atof(id(input_a_dac_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_DAC_C"
          calibration_value: !lambda "return atof(id(input_a_dac_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "VIN_ADC_K"
          calibration_value: !lambda "return atof(id(input_vin_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "VIN_ADC_C"
          calibration_value: !lambda "return atof(id(input_vin_adc_c).state.c_str());"
      - logger.log: "All calibration parameters set"

  # --- Clear All Calibration ---
  - platform: template
    name: "Clear All Calibration"
    on_press:
      - opendps.clear_calibration:
          id: opendps_id
      - logger.log: "Cleared all calibration (reset to defaults)"

  # --- Calibration Backup/Restore ---
  - platform: template
    name: "Save Calibration to Storage"
    on_press:
      - opendps.request_calibration_report:
          id: opendps_id
      - delay: 500ms
      - opendps.save_calibration:
          id: opendps_id
      - logger.log: "Calibration saved to storage"

  - platform: template
    name: "Restore Calibration from Storage"
    on_press:
      - opendps.restore_calibration:
          id: opendps_id
      - logger.log: "Calibration restored from storage"
  - platform: template
    name: "Cancel Calibration"
    on_press:
      - opendps.cancel_calibration_assistant:
          id: opendps_id
      - logger.log: "Calibration cancelled"

light:
  - platform: monochromatic
    output: backlight_output
    name: LCD Backlight
    id: lcd_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0
  - platform: monochromatic
    id: display_backlight
    name: "Display backlight brightness"
    output: brightness_output
    restore_mode: ALWAYS_ON
    gamma_correct: 1.0
    default_transition_length: 0s
    icon: mdi:television-ambient-light
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 10

number:
  - platform: template
    id: voltage_number
    name: "Set Voltage"
    icon: mdi:flash-triangle
    min_value: 0
    max_value: 50
    step: 0.1
    unit_of_measurement: "V"
    mode: box
    optimistic: true
    set_action:
      - lambda: |-
          if (id(opendps_id).is_connected())
            id(opendps_id).set_voltage(x);
    on_value:
      - globals.set:
          id: g_vset
          value: !lambda 'return x;'
      - lambda: |-
          id(g_slider_updating) = true;
          lv_slider_set_value(id(sl_v), (int)(x / id(g_vmax) * 10000.0f), LV_ANIM_OFF);
          lv_obj_invalidate(id(sl_v));
          id(g_slider_updating) = false;
      - lambda: |-
          char buf[16];
          snprintf(buf, sizeof(buf), "%.2f", x);
          lv_label_set_text(id(lbl_setv), buf);
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 50
  - platform: template
    id: current_number
    name: "Set Current Limit"
    icon: mdi:current-dc
    min_value: 0
    max_value: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: box
    optimistic: true
    set_action:
      - lambda: |-
          if (id(opendps_id).is_connected())
            id(opendps_id).set_current(x);
    on_value:
      - globals.set:
          id: g_iset
          value: !lambda 'return x;'
      - lambda: |-
          lv_slider_set_value(id(sl_i), (int)(x * 100), LV_ANIM_OFF);
          lv_obj_invalidate(id(sl_i));
      - lambda: |-
          char buf[16];
          snprintf(buf, sizeof(buf), "%.3f", x);
          lv_label_set_text(id(lbl_seti), buf);
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 60
  - platform: template
    id: voltage_max_number
    name: "Max Voltage"
    icon: mdi:flash-triangle-outline
    min_value: 10
    max_value: 50
    step: 0.1
    unit_of_measurement: "V"
    mode: box
    optimistic: true
    initial_value: 44.3
    restore_value: true
    on_value:
      - globals.set:
          id: g_vmax
          value: !lambda 'return x;'
      - lambda: |-
          lv_obj_invalidate(id(sl_v));
          char buf[8];
          snprintf(buf, sizeof(buf), "%.1f", x * 0.25f); lv_label_set_text(id(lbl_vtick25), buf);
          snprintf(buf, sizeof(buf), "%.1f", x * 0.50f); lv_label_set_text(id(lbl_vtick50), buf);
          snprintf(buf, sizeof(buf), "%.1f", x * 0.75f); lv_label_set_text(id(lbl_vtick75), buf);
          snprintf(buf, sizeof(buf), "%.1fV", x);         lv_label_set_text(id(lbl_vtick100), buf);
      - lvgl.label.update:
          id: lbl_vrange
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "0 - %.1fV", x);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_vmax_val
          text: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%.1fV", x);
            return std::string(buf);
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 70

output:
  - id: backlight_output
    platform: ledc
    pin: GPIO23
  - platform: template
    type: float
    id: brightness_output
    write_action:
      - lambda: |-
          id(opendps_id).set_brightness(static_cast<uint8_t>(state*100));

sensor:
  - platform: opendps
    opendps_id: opendps_id
    voltage_out:
      id: opendps_output_voltage
      on_value:
        - lvgl.label.update:
            id: lbl_vout
            text: {format: "%.2f", args: [x]}
            text_color: !lambda 'return id(g_output_on) ? lv_color_hex(0x39FF14) : lv_color_hex(0x2A2A2A);'
        - lvgl.label.update:
            id: lbl_vout_g
            text: {format: "Vout  %.2fV", args: [x]}
        - lambda: |-
            int v = (int)(x * 10.0f + 0.5f);
            if (v < 0) v = 0;
            id(g_chart_v_val) = v;
    current_out:
      id: opendps_ouput_current
      on_value:
        - lvgl.label.update:
            id: lbl_iout
            text: {format: "%.3f", args: [x]}
            text_color: !lambda 'return id(g_output_on) ? lv_color_hex(0x4499FF) : lv_color_hex(0x2A2A2A);'
        - lvgl.label.update:
            id: lbl_iout_g
            text: {format: "Iout  %.3fA", args: [x]}
        - lambda: |-
            int v = (int)(x * 100.0f + 0.5f);
            if (v < 0) v = 0;
            id(g_chart_i_val) = v;

    power_out:
      id: opendps_output_power
      on_value:
        - lvgl.label.update:
            id: lbl_pout_g
            text: {format: "Pout  %.2fW", args: [x]}
        - lambda: |-
            float vset = id(opendps_voltage_set).state;
            float iset = id(opendps_current_set).state;
            float pmax = vset * iset;
            // Normalize power to the V-axis range (0..Vset*1.15*10) so it overlays correctly
            float v_axis_max = vset * 1.15f * 10.0f;
            if (isnan(pmax) || pmax <= 0.001f || v_axis_max <= 0.001f) { id(g_chart_p_val) = 0; return; }
            int v = (int)(x / pmax * v_axis_max + 0.5f);
            if (v < 0) v = 0;
            id(g_chart_p_val) = v;
    voltage_set:
      id: opendps_voltage_set
      on_value:
        - lambda: |-
            if (!id(g_ui_active))
              id(voltage_number).make_call().set_value(x).perform();
            // Update V setpoint global and chart primary-Y axis range
            id(g_chart_vset_val) = (int)(x * 10.0f + 0.5f);
            int v_max = (int)(x * 1.15f * 10.0f + 0.5f);
            if (v_max < 10) v_max = 10;
            lv_chart_set_range(id(chart_main), LV_CHART_AXIS_PRIMARY_Y, 0, v_max);
            // Update left scale labels (5 ticks: 0%, 25%, 50%, 75%, 100% of Vset*1.15)
            float step = x * 1.15f / 4.0f;
            lv_label_set_text_fmt(id(lbl_scale_v4), "%.1f", x * 1.15f);
            lv_label_set_text_fmt(id(lbl_scale_v3), "%.1f", step * 3.0f);
            lv_label_set_text_fmt(id(lbl_scale_v2), "%.1f", step * 2.0f);
            lv_label_set_text_fmt(id(lbl_scale_v1), "%.1f", step * 1.0f);
            lv_label_set_text_fmt(id(lbl_scale_v0), "0.0");
    current_set:
      id: opendps_current_set
      on_value:
        - lambda: |-
            if (!id(g_ui_active))
              id(current_number).make_call().set_value(x).perform();
            // Update I setpoint global and chart secondary-Y axis range
            id(g_chart_iset_val) = (int)(x * 100.0f + 0.5f);
            int i_max = (int)(x * 1.15f * 100.0f + 0.5f);
            if (i_max < 10) i_max = 10;
            lv_chart_set_range(id(chart_main), LV_CHART_AXIS_SECONDARY_Y, 0, i_max);
            // Update right scale labels (5 ticks: 0%, 25%, 50%, 75%, 100% of Iset*1.15)
            float step = x * 1.15f / 4.0f;
            lv_label_set_text_fmt(id(lbl_scale_i4), "%.2f", x * 1.15f);
            lv_label_set_text_fmt(id(lbl_scale_i3), "%.2f", step * 3.0f);
            lv_label_set_text_fmt(id(lbl_scale_i2), "%.2f", step * 2.0f);
            lv_label_set_text_fmt(id(lbl_scale_i1), "%.2f", step * 1.0f);
            lv_label_set_text_fmt(id(lbl_scale_i0), "0.00");
    voltage_in:
      id: opendps_input_voltage
      on_value:
        - lvgl.label.update:
            id: lbl_vin
            text: {format: "%.2fV", args: [x]}

script:
  - id: opendps_on_connect_init
    mode: restart
    then:
      - opendps.request_calibration_report:
          id: opendps_id
      - delay: 500ms
      - lambda: |-
          auto &cal = id(opendps_id).get_calibration_data();
          char buf[32];
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_k);
          id(input_v_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_c);
          id(input_v_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_k);
          id(input_v_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_c);
          id(input_v_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_k);
          id(input_a_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_c);
          id(input_a_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_k);
          id(input_a_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_c);
          id(input_a_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_k);
          id(input_vin_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_c);
          id(input_vin_adc_c).publish_state(buf);

  # Rebuilds the file list of fw_file_list from current g_fw_cwd.
  # Applies *.bin filter if g_fw_filter_bin is true.
  # Keeps directories always visible. Adds a ".." entry when not at a mount root.
  - id: fw_refresh_list
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *list = id(fw_file_list);
          lv_obj_clean(list);

          std::string cwd = id(g_fw_cwd);
          lv_label_set_text(id(fw_breadcrumb), cwd.c_str());

          std::vector<std::string> dirs;
          std::vector<std::string> files;

          auto bin_filter = [&](const std::string &name, uint64_t size) -> bool {
            if (!id(g_fw_filter_bin)) return true;
            if (name.size() < 4) return false;
            std::string ext = name.substr(name.size() - 4);
            std::transform(ext.begin(), ext.end(), ext.begin(), ::tolower);
            if (ext != ".bin") return false;
            if (size > 58368) return false;  // app_size = 64K - 5K boot - 2K past
            return true;
          };

          const std::string &nfs_mount = id(nfs_share).get_mount_path();
          bool is_nfs = !nfs_mount.empty() && cwd.compare(0, nfs_mount.size(), nfs_mount) == 0;

          if (is_nfs) {
            if (!id(nfs_share).is_mounted()) {
              lv_obj_t *err = lv_list_add_text(list, "(NFS not connected)");
              lv_obj_set_style_text_color(err, lv_color_hex(0xFF6666), 0);
              return;
            }
            // Strip mount prefix: "/nfs" -> "/", "/nfs/sub" -> "/sub"
            std::string nfs_path = cwd.substr(nfs_mount.size());
            if (nfs_path.empty()) nfs_path = "/";
            std::vector<esphome::nfs_client::NFSDirEntry> nfs_entries;
            if (!id(nfs_share).list_directory(nfs_path, nfs_entries)) {
              lv_obj_t *err = lv_list_add_text(list, "(cannot open directory)");
              lv_obj_set_style_text_color(err, lv_color_hex(0xFF6666), 0);
              return;
            }
            for (const auto &e : nfs_entries) {
              if (e.has_attr && e.attr.type == esphome::nfs_client::NF3DIR) {
                dirs.push_back(e.name);
              } else if (!e.has_attr || e.attr.type == esphome::nfs_client::NF3REG) {
                uint64_t sz = e.has_attr ? e.attr.size : 0;
                if (bin_filter(e.name, sz)) files.push_back(e.name);
              }
            }
          } else {
            DIR *dir = opendir(cwd.c_str());
            if (!dir) {
              lv_obj_t *err = lv_list_add_text(list, "(cannot open directory)");
              lv_obj_set_style_text_color(err, lv_color_hex(0xFF6666), 0);
              return;
            }
            struct dirent *ent;
            while ((ent = readdir(dir)) != nullptr) {
              std::string name = ent->d_name;
              if (name == "." || name == "..") continue;
              std::string path = cwd + "/" + name;
              struct stat st;
              if (stat(path.c_str(), &st) != 0) continue;
              if (S_ISDIR(st.st_mode)) {
                dirs.push_back(name);
              } else if (S_ISREG(st.st_mode) && bin_filter(name, st.st_size)) {
                files.push_back(name);
              }
            }
            closedir(dir);
          }
          std::sort(dirs.begin(), dirs.end());
          std::sort(files.begin(), files.end());

          // user_data encoding:
          //   nullptr      = parent (..) entry
          //   ptr & 1 == 1 = directory: strip low bit, cast to char*
          //   ptr & 1 == 0 = file:      cast to char* (absolute path)
          // Strings are heap-allocated and freed in the delete callback.
          auto delete_cb = [](lv_event_t *e) {
            void *ud = lv_obj_get_user_data((lv_obj_t *)lv_event_get_target(e));
            uintptr_t p = (uintptr_t)ud;
            if (p == 0) return;
            char *s = (char *)(p & ~(uintptr_t)1);
            delete[] s;
          };

          auto click_cb = [](lv_event_t *e) {
            lv_obj_t *btn = (lv_obj_t *)lv_event_get_target(e);
            uintptr_t p = (uintptr_t)lv_obj_get_user_data(btn);

            // Parent navigation
            if (p == 0) {
              std::string cwd = id(g_fw_cwd);
              size_t pos = cwd.find_last_of('/');
              if (pos != std::string::npos && pos > 0)
                id(g_fw_cwd) = cwd.substr(0, pos);
              id(fw_refresh_list).execute();
              return;
            }

            bool is_dir = (p & 1) != 0;
            char *s = (char *)(p & ~(uintptr_t)1);

            if (is_dir) {
              id(g_fw_cwd) = s;
              id(fw_refresh_list).execute();
              return;
            }

            // Regular file: absolute path already stored
            id(g_fw_selected) = s;
            lv_label_set_text(id(fw_selected_lbl), s);
            lv_obj_clear_state(id(fw_flash_btn), LV_STATE_DISABLED);
          };

          if (cwd != "/sdcard" && cwd != "/usb" && cwd != "/nfs" && cwd != "/") {
            lv_obj_t *up_btn = lv_list_add_button(list, LV_SYMBOL_UP, "..  (parent)");
            lv_obj_set_user_data(up_btn, nullptr);
            lv_obj_add_event_cb(up_btn, click_cb, LV_EVENT_CLICKED, nullptr);
          }

          for (size_t i = 0; i < dirs.size(); i++) {
            std::string full = cwd + "/" + dirs[i];
            char *s = new char[full.size() + 1];
            memcpy(s, full.c_str(), full.size() + 1);
            lv_obj_t *b = lv_list_add_button(list, LV_SYMBOL_DIRECTORY, dirs[i].c_str());
            lv_obj_set_style_text_color(b, lv_color_hex(0xCCCCCC), 0);
            lv_obj_set_user_data(b, (void *)((uintptr_t)s | 1));
            lv_obj_add_event_cb(b, click_cb, LV_EVENT_CLICKED, nullptr);
            lv_obj_add_event_cb(b, delete_cb, LV_EVENT_DELETE, nullptr);
          }
          for (size_t i = 0; i < files.size(); i++) {
            std::string full = cwd + "/" + files[i];
            char *s = new char[full.size() + 1];
            memcpy(s, full.c_str(), full.size() + 1);
            lv_obj_t *b = lv_list_add_button(list, LV_SYMBOL_FILE, files[i].c_str());
            lv_obj_set_style_text_color(b, lv_color_hex(0xEEEEEE), 0);
            lv_obj_set_user_data(b, (void *)(uintptr_t)s);
            lv_obj_add_event_cb(b, click_cb, LV_EVENT_CLICKED, nullptr);
            lv_obj_add_event_cb(b, delete_cb, LV_EVENT_DELETE, nullptr);
          }

          if (dirs.empty() && files.empty()) {
            lv_obj_t *e = lv_list_add_text(list, "(no matching files)");
            lv_obj_set_style_text_color(e, lv_color_hex(0x777777), 0);
          }

  # Select a storage and reset cwd + selected file
  - id: fw_set_storage
    mode: restart
    parameters:
      which: int
    then:
      - globals.set:
          id: g_fw_storage
          value: !lambda 'return which;'
      - globals.set:
          id: g_fw_selected
          value: '""'
      - lambda: |-
          switch (which) {
            case 0: id(g_fw_cwd) = "/sdcard"; break;
            case 1: id(g_fw_cwd) = "/usb"; break;
            case 2: id(g_fw_cwd) = "/nfs"; break;
            case 3: id(g_fw_cwd) = ""; break;
          }
      - lvgl.label.update:
          id: fw_selected_lbl
          text: "(no file selected)"
      - lvgl.widget.disable: fw_flash_btn
      - script.execute: fw_refresh_list

  # Rebuilds the dir list of log_dir_list from current g_log_cwd (directories only).
  - id: log_refresh_list
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *list = id(log_dir_list);
          lv_obj_clean(list);

          std::string cwd = id(g_log_cwd);
          lv_label_set_text(id(log_breadcrumb), cwd.c_str());
          lv_label_set_text(id(log_dir_selected_lbl), cwd.c_str());

          std::vector<std::string> dirs;

          DIR *dir = opendir(cwd.c_str());
          if (!dir) {
            lv_obj_t *err = lv_list_add_text(list, "(cannot open directory)");
            lv_obj_set_style_text_color(err, lv_color_hex(0xFF6666), 0);
            return;
          }
          struct dirent *ent;
          while ((ent = readdir(dir)) != nullptr) {
            std::string name = ent->d_name;
            if (name == "." || name == "..") continue;
            std::string path = cwd + "/" + name;
            struct stat st;
            if (stat(path.c_str(), &st) != 0) continue;
            if (S_ISDIR(st.st_mode)) dirs.push_back(name);
          }
          closedir(dir);
          std::sort(dirs.begin(), dirs.end());

          auto delete_cb = [](lv_event_t *e) {
            void *ud = lv_obj_get_user_data((lv_obj_t *)lv_event_get_target(e));
            uintptr_t p = (uintptr_t)ud;
            if (p == 0) return;
            char *s = (char *)(p & ~(uintptr_t)1);
            delete[] s;
          };
          auto click_cb = [](lv_event_t *e) {
            lv_obj_t *btn = (lv_obj_t *)lv_event_get_target(e);
            uintptr_t p = (uintptr_t)lv_obj_get_user_data(btn);
            if (p == 0) {
              std::string cwd = id(g_log_cwd);
              size_t pos = cwd.find_last_of('/');
              if (pos != std::string::npos && pos > 0)
                id(g_log_cwd) = cwd.substr(0, pos);
              id(log_refresh_list).execute();
              return;
            }
            char *s = (char *)(p & ~(uintptr_t)1);
            id(g_log_cwd) = s;
            lv_label_set_text(id(log_breadcrumb), s);
            id(log_refresh_list).execute();
          };

          if (cwd != "/sdcard" && cwd != "/usb" && cwd != "/nfs" && cwd != "/") {
            lv_obj_t *up_btn = lv_list_add_button(list, LV_SYMBOL_UP, "..  (parent)");
            lv_obj_set_user_data(up_btn, nullptr);
            lv_obj_add_event_cb(up_btn, click_cb, LV_EVENT_CLICKED, nullptr);
          }
          for (size_t i = 0; i < dirs.size(); i++) {
            std::string full = cwd + "/" + dirs[i];
            char *s = new char[full.size() + 1];
            memcpy(s, full.c_str(), full.size() + 1);
            lv_obj_t *b = lv_list_add_button(list, LV_SYMBOL_DIRECTORY, dirs[i].c_str());
            lv_obj_set_style_text_color(b, lv_color_hex(0xCCCCCC), 0);
            lv_obj_set_user_data(b, (void *)((uintptr_t)s | 1));
            lv_obj_add_event_cb(b, click_cb, LV_EVENT_CLICKED, nullptr);
            lv_obj_add_event_cb(b, delete_cb, LV_EVENT_DELETE, nullptr);
          }
          if (dirs.empty()) {
            lv_obj_t *e = lv_list_add_text(list, "(no subdirectories)");
            lv_obj_set_style_text_color(e, lv_color_hex(0x777777), 0);
          }

  - id: log_set_storage
    mode: restart
    parameters:
      which: int
    then:
      - globals.set:
          id: g_log_storage
          value: !lambda 'return which;'
      - lambda: |-
          switch (which) {
            case 0: id(g_log_cwd) = "/sdcard"; break;
            case 1: id(g_log_cwd) = "/usb"; break;
            case 2: id(g_log_cwd) = "/nfs"; break;
          }
      - script.execute: log_refresh_list

  # Trigger the firmware flash using the OpenDPS hub
  - id: fw_flash
    mode: single
    then:
      - lambda: |-
          std::string path = id(g_fw_selected);
          if (path.empty()) {
            id(g_fw_status) = "Error: no file selected";
            return;
          }
          id(g_fw_flashing) = true;
          id(g_fw_progress) = 0;
          id(g_fw_status) = "Uploading firmware...";
          id(opendps_firmware_path) = path;
          id(opendps_id).start_firmware_upgrade(path);
      - lvgl.widget.show: fw_progress_overlay
      - lvgl.label.update:
          id: fw_progress_status
          text: !lambda 'return id(g_fw_status).c_str();'
      - lvgl.bar.update:
          id: fw_progress_bar
          value: 0

  # Poll updates from g_fw_status / g_fw_progress into the overlay.
  # Called both from the 500ms interval (while g_fw_flashing) and directly
  # from the progress/complete callbacks for immediate LVGL updates.
  - id: fw_poll_status
    mode: single
    then:
      - lvgl.label.update:
          id: fw_progress_status
          text: !lambda 'return id(g_fw_status).c_str();'
      - lvgl.bar.update:
          id: fw_progress_bar
          value: !lambda 'return id(g_fw_progress);'

  # Loads scheme colors into theme_* globals (scheme 0 = custom, leave globals untouched)
  - id: scr_load_scheme
    then:
      - lambda: |-
          switch (id(g_theme_scheme)) {
            case 1: // Neon (default)
              id(theme_accent)   = 0x39FF14;
              id(theme_voltage)  = 0x39FF14;
              id(theme_current)  = 0x4499FF;
              id(theme_bg_main)  = 0x1E1E1E;
              id(theme_bg_panel) = 0x141414;
              id(theme_text_dim) = 0x555555;
              break;
            case 2: // Amber
              id(theme_accent)   = 0xFFBF00;
              id(theme_voltage)  = 0xFFDD44;
              id(theme_current)  = 0xFF8800;
              id(theme_bg_main)  = 0x1A1500;
              id(theme_bg_panel) = 0x0F0C00;
              id(theme_text_dim) = 0x665500;
              break;
            case 3: // Ice
              id(theme_accent)   = 0x00DDFF;
              id(theme_voltage)  = 0x88EEFF;
              id(theme_current)  = 0x4488FF;
              id(theme_bg_main)  = 0x0A1520;
              id(theme_bg_panel) = 0x050D18;
              id(theme_text_dim) = 0x336688;
              break;
            default: // 0 = custom, globals already have user values
              break;
          }

  # Applies theme_* globals to all styled widgets and triggers full redraw
  - id: scr_apply_theme
    then:
      - lambda: |-
          lv_color_t c_acc  = lv_color_hex((uint32_t)id(theme_accent));
          lv_color_t c_volt = lv_color_hex((uint32_t)id(theme_voltage));
          lv_color_t c_curr = lv_color_hex((uint32_t)id(theme_current));
          lv_color_t c_bg   = lv_color_hex((uint32_t)id(theme_bg_main));
          lv_color_t c_pan  = lv_color_hex((uint32_t)id(theme_bg_panel));
          lv_color_t c_dim  = lv_color_hex((uint32_t)id(theme_text_dim));

          // Derive secondary colors from tokens
          // bg_active = accent at ~15% brightness for active-button backgrounds
          uint8_t ar = (id(theme_accent) >> 16) & 0xFF;
          uint8_t ag = (id(theme_accent) >> 8)  & 0xFF;
          uint8_t ab = (id(theme_accent))        & 0xFF;
          lv_color_t c_acc_dim  = lv_color_make(ar/6, ag/6, ab/6);   // dark tint for active bg
          lv_color_t c_acc_mid  = lv_color_make(ar/3, ag/3, ab/3);   // mid tint for borders etc

          uint8_t vr = (id(theme_voltage) >> 16) & 0xFF;
          uint8_t vg = (id(theme_voltage) >> 8)  & 0xFF;
          uint8_t vb = (id(theme_voltage))        & 0xFF;
          lv_color_t c_volt_dim = lv_color_make(vr/6, vg/6, vb/6);

          uint8_t cr2 = (id(theme_current) >> 16) & 0xFF;
          uint8_t cg2 = (id(theme_current) >> 8)  & 0xFF;
          uint8_t cb2 = (id(theme_current))        & 0xFF;
          lv_color_t c_curr_dim = lv_color_make(cr2/6, cg2/6, cb2/6);

          // ── Page backgrounds ──────────────────────────────────────────
          lv_obj_set_style_bg_color(id(page_main)->obj,     c_bg,  LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(page_graphs)->obj,   lv_color_hex((uint32_t)id(theme_bg_panel)), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(page_settings)->obj, c_pan, LV_PART_MAIN);

          // ── Voltage slider ────────────────────────────────────────────
          lv_obj_set_style_bg_color(id(sl_v), c_volt_dim, LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(sl_v), c_volt,     LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(sl_v), c_volt,     LV_PART_KNOB);
          lv_obj_set_style_border_color(id(sl_v), c_volt_dim, LV_PART_KNOB);

          // ── Current slider ────────────────────────────────────────────
          lv_obj_set_style_bg_color(id(sl_i), c_curr,     LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(sl_i), c_curr,     LV_PART_KNOB);
          lv_obj_set_style_border_color(id(sl_i), c_curr_dim, LV_PART_KNOB);

          // ── Power button ring / labels ────────────────────────────────
          bool pwr = id(g_output_on);
          lv_obj_set_style_border_color(id(pwr_ring), pwr ? c_acc : c_dim, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_pwr_icon), pwr ? c_acc : c_dim, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_pwr_on),  c_acc, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_pwr_off), c_dim, LV_PART_MAIN);

          // ── Set value labels ──────────────────────────────────────────
          lv_obj_set_style_text_color(id(lbl_setv), pwr ? c_acc_dim : c_volt, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_seti), pwr ? c_curr_dim : c_curr, LV_PART_MAIN);

          // ── Readout labels ────────────────────────────────────────────
          lv_obj_set_style_text_color(id(lbl_vout), pwr ? c_volt : lv_color_hex(0x2A2A2A), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_iout), pwr ? c_curr : lv_color_hex(0x2A2A2A), LV_PART_MAIN);

          // ── Tab bar ───────────────────────────────────────────────────
          // Active tab determined by current page — just set all to dim, active page handler will correct
          lv_obj_set_style_border_color(id(tab_btn_main),     c_acc, LV_PART_MAIN);
          lv_obj_set_style_border_color(id(tab_btn_graphs),   c_acc, LV_PART_MAIN);
          lv_obj_set_style_border_color(id(tab_btn_settings), c_acc, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(tab_lbl_main),     c_dim, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(tab_lbl_graphs),   c_dim, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(tab_lbl_settings), c_dim, LV_PART_MAIN);

          // ── LCD panels ────────────────────────────────────────────────
          lv_obj_set_style_bg_color(id(lcd_panel_v),
            lv_color_make(vr/20, vg/20, vb/20), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(lcd_panel_v),
            lv_color_make(vr/8, vg/8, vb/8), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(lcd_panel_i),
            lv_color_make(cr2/20, cg2/20, cb2/20), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(lcd_panel_i),
            lv_color_make(cr2/8, cg2/8, cb2/8), LV_PART_MAIN);

          // ── DPS connected icon ────────────────────────────────────────
          bool dps_ok = id(dps_connected_sensor_id).state;
          lv_obj_set_style_text_color(id(lbl_icon_dps), dps_ok ? c_acc : lv_color_hex(0x333333), LV_PART_MAIN);

          // ── CV mode button (active state) ─────────────────────────────
          lv_obj_set_style_bg_color(id(btn_cv),   c_acc_dim, LV_STATE_DEFAULT);
          lv_obj_set_style_border_color(id(btn_cv), c_acc,   LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(lbl_cv),  c_acc,   LV_PART_MAIN);

          // ── Preset bar buttons ────────────────────────────────────────
          // rebuilt by scr_rebuild_presets which reads theme globals at creation time

          // ── Settings page accent (title + edit buttons) ───────────────
          lv_obj_set_style_border_color(id(btn_open_preset_editor), c_acc, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(btn_open_preset_editor),
            lv_color_make(ar/10, ag/10, ab/10), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(btn_open_theme_editor), c_acc, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(btn_open_theme_editor),
            lv_color_make(ar/10, ag/10, ab/10), LV_PART_MAIN);

          // ── Full redraw ───────────────────────────────────────────────
          lv_obj_report_style_change(NULL);

  # Loads scheme then applies — call this from boot and from theme overlay Save
  - id: scr_theme_apply_full
    then:
      - script.execute: scr_load_scheme
      - script.execute: scr_apply_theme
      - script.execute: scr_rebuild_presets

  # Loads slot values into g_edit_v/i and refreshes overlay labels.
  # Call when slot changes (prev/next) or when overlay first opens.
  - id: scr_update_edit_labels
    then:
      - lambda: |-
          float vv[12] = {
            id(preset_v_0), id(preset_v_1), id(preset_v_2), id(preset_v_3),
            id(preset_v_4), id(preset_v_5), id(preset_v_6), id(preset_v_7),
            id(preset_v_8), id(preset_v_9), id(preset_v_10), id(preset_v_11)
          };
          float ii[12] = {
            id(preset_i_0), id(preset_i_1), id(preset_i_2), id(preset_i_3),
            id(preset_i_4), id(preset_i_5), id(preset_i_6), id(preset_i_7),
            id(preset_i_8), id(preset_i_9), id(preset_i_10), id(preset_i_11)
          };
          int s = id(g_edit_slot);
          id(g_edit_v) = vv[s];
          id(g_edit_i) = ii[s];
          char buf[16];
          snprintf(buf, sizeof(buf), "%d / %d", s + 1, id(preset_count));
          lv_label_set_text(id(lbl_edit_slot), buf);
          snprintf(buf, sizeof(buf), "%.4g", id(g_edit_v));
          lv_label_set_text(id(lbl_edit_v), buf);
          snprintf(buf, sizeof(buf), "%.4g", id(g_edit_i));
          lv_label_set_text(id(lbl_edit_i), buf);
          // Update preset count label
          snprintf(buf, sizeof(buf), "%d", id(preset_count));
          lv_label_set_text(id(lbl_preset_count), buf);
          // Save disabled if V=0 or I=0
          bool save_ok = (id(g_edit_v) > 0.0f) && (id(g_edit_i) > 0.0f);
          if (save_ok)
            lv_obj_clear_state(id(btn_preset_edit_save), LV_STATE_DISABLED);
          else
            lv_obj_add_state(id(btn_preset_edit_save), LV_STATE_DISABLED);
          // Count-inc disabled while a new unsaved slot exists or count at max
          bool inc_ok = !id(g_preset_new_unsaved) && (id(preset_count) < 12);
          if (inc_ok)
            lv_obj_clear_state(id(btn_preset_count_inc), LV_STATE_DISABLED);
          else
            lv_obj_add_state(id(btn_preset_count_inc), LV_STATE_DISABLED);

  # Voltage decrement (0.1V steps, min 0.1)
  - id: scr_edit_v_step
    then:
      - lambda: |-
          float v = roundf((id(g_edit_v) - 0.1f) * 10.0f) / 10.0f;
          if (v < 0.1f) v = 0.1f;
          id(g_edit_v) = v;
          id(scr_update_edit_labels).execute();

  # Voltage increment (0.1V steps, max 50.0)
  - id: scr_edit_v_step_up
    then:
      - lambda: |-
          float v = roundf((id(g_edit_v) + 0.1f) * 10.0f) / 10.0f;
          if (v > 50.0f) v = 50.0f;
          id(g_edit_v) = v;
          id(scr_update_edit_labels).execute();

  # Current decrement (0.1A steps, min 0.1)
  - id: scr_edit_i_step
    then:
      - lambda: |-
          float i = roundf((id(g_edit_i) - 0.1f) * 10.0f) / 10.0f;
          if (i < 0.1f) i = 0.1f;
          id(g_edit_i) = i;
          id(scr_update_edit_labels).execute();

  # Current increment (0.1A steps, max 5.0)
  - id: scr_edit_i_step_up
    then:
      - lambda: |-
          float i = roundf((id(g_edit_i) + 0.1f) * 10.0f) / 10.0f;
          if (i > 5.0f) i = 5.0f;
          id(g_edit_i) = i;
          id(scr_update_edit_labels).execute();

  # Save edited preset to the correct global, then rebuild bar and close overlay
  - id: scr_save_preset
    then:
      - lambda: |-
          int s = id(g_edit_slot);
          float v = id(g_edit_v);
          float i2 = id(g_edit_i);
          if (v <= 0.0f || i2 <= 0.0f) return;  // guard: V=0 or I=0 not allowed
          switch (s) {
            case 0:  id(preset_v_0) = v; id(preset_i_0) = i2; break;
            case 1:  id(preset_v_1) = v; id(preset_i_1) = i2; break;
            case 2:  id(preset_v_2) = v; id(preset_i_2) = i2; break;
            case 3:  id(preset_v_3) = v; id(preset_i_3) = i2; break;
            case 4:  id(preset_v_4) = v; id(preset_i_4) = i2; break;
            case 5:  id(preset_v_5) = v; id(preset_i_5) = i2; break;
            case 6:  id(preset_v_6) = v; id(preset_i_6) = i2; break;
            case 7:  id(preset_v_7) = v; id(preset_i_7) = i2; break;
            case 8:  id(preset_v_8) = v; id(preset_i_8) = i2; break;
            case 9:  id(preset_v_9) = v; id(preset_i_9) = i2; break;
            case 10: id(preset_v_10) = v; id(preset_i_10) = i2; break;
            case 11: id(preset_v_11) = v; id(preset_i_11) = i2; break;
            default: break;
          }
          id(g_preset_new_unsaved) = false;
          lv_obj_add_flag(id(overlay_preset_editor), LV_OBJ_FLAG_HIDDEN);
      - script.execute: scr_rebuild_presets

  # Delete preset at g_edit_slot: shift slots above it down, decrement count.
  - id: scr_delete_preset
    then:
      - lambda: |-
          int cnt = id(preset_count);
          if (cnt <= 1) return;  // never delete the last preset
          int s = id(g_edit_slot);
          // Arrays of pointers for shift
          float *vv[12] = {
            &id(preset_v_0),  &id(preset_v_1),  &id(preset_v_2),  &id(preset_v_3),
            &id(preset_v_4),  &id(preset_v_5),  &id(preset_v_6),  &id(preset_v_7),
            &id(preset_v_8),  &id(preset_v_9),  &id(preset_v_10), &id(preset_v_11)
          };
          float *ii[12] = {
            &id(preset_i_0),  &id(preset_i_1),  &id(preset_i_2),  &id(preset_i_3),
            &id(preset_i_4),  &id(preset_i_5),  &id(preset_i_6),  &id(preset_i_7),
            &id(preset_i_8),  &id(preset_i_9),  &id(preset_i_10), &id(preset_i_11)
          };
          for (int i = s; i < cnt - 1; i++) {
            *vv[i] = *vv[i + 1];
            *ii[i] = *ii[i + 1];
          }
          // Clear the vacated last slot
          *vv[cnt - 1] = 0.0f;
          *ii[cnt - 1] = 0.0f;
          id(preset_count) = cnt - 1;
          // Clamp edit slot
          if (id(g_edit_slot) >= id(preset_count))
            id(g_edit_slot) = id(preset_count) - 1;
          // If we just deleted a new unsaved slot, clear the flag
          id(g_preset_new_unsaved) = false;
      - script.execute: scr_update_edit_labels
      - script.execute: scr_rebuild_presets

  # Rebuilds all preset buttons in preset_bar from globals.
  # Called on boot and after saving preset edits.
  - id: scr_rebuild_presets
    mode: restart
    then:
      - lambda: |-
          // float arrays for easy indexed access
          float vv[12] = {
            id(preset_v_0), id(preset_v_1), id(preset_v_2), id(preset_v_3),
            id(preset_v_4), id(preset_v_5), id(preset_v_6), id(preset_v_7),
            id(preset_v_8), id(preset_v_9), id(preset_v_10), id(preset_v_11)
          };
          float ii[12] = {
            id(preset_i_0), id(preset_i_1), id(preset_i_2), id(preset_i_3),
            id(preset_i_4), id(preset_i_5), id(preset_i_6), id(preset_i_7),
            id(preset_i_8), id(preset_i_9), id(preset_i_10), id(preset_i_11)
          };
          int cnt = id(preset_count);
          if (cnt < 1) cnt = 1;
          if (cnt > 12) cnt = 12;

          lv_obj_t *bar = id(preset_bar);

          // Remove previously created buttons
          lv_obj_clean(bar);

          int32_t btn_w = 1024 / cnt;

          for (int i = 0; i < cnt; i++) {
            lv_obj_t *btn = lv_btn_create(bar);
            lv_obj_set_pos(btn, i * btn_w, 0);
            lv_obj_set_size(btn, btn_w, 96);
            lv_obj_set_style_bg_color(btn, lv_color_hex(0x0A0A0A), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(btn, LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_color(btn, lv_color_hex(0x1A1A1A), LV_PART_MAIN);
            lv_obj_set_style_border_width(btn, 1, LV_PART_MAIN);
            lv_obj_set_style_radius(btn, 0, LV_PART_MAIN);
            lv_obj_set_style_pad_all(btn, 0, LV_PART_MAIN);
            // Remove default pressed/checked style changes
            lv_obj_set_style_bg_color(btn, lv_color_hex(0x0A0A0A), (lv_style_selector_t)((uint32_t)LV_PART_MAIN | (uint32_t)LV_STATE_PRESSED));

            // Inner container (non-clickable, flex column, centered)
            lv_obj_t *inner = lv_obj_create(btn);
            lv_obj_set_size(inner, btn_w - 6, 60);
            lv_obj_align(inner, LV_ALIGN_CENTER, 0, 0);
            lv_obj_set_style_bg_opa(inner, LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_width(inner, 0, LV_PART_MAIN);
            lv_obj_set_style_pad_all(inner, 0, LV_PART_MAIN);
            lv_obj_clear_flag(inner, LV_OBJ_FLAG_CLICKABLE);
            lv_obj_set_scrollbar_mode(inner, LV_SCROLLBAR_MODE_OFF);
            lv_obj_set_flex_flow(inner, LV_FLEX_FLOW_COLUMN);
            lv_obj_set_flex_align(inner, LV_FLEX_ALIGN_CENTER, LV_FLEX_ALIGN_CENTER, LV_FLEX_ALIGN_CENTER);
            lv_obj_set_style_pad_row(inner, 2, LV_PART_MAIN);

            char buf[16];
            // Voltage label
            lv_obj_t *lbl_v = lv_label_create(inner);
            snprintf(buf, sizeof(buf), "%.4gV", vv[i]);
            lv_label_set_text(lbl_v, buf);
            lv_obj_set_style_text_color(lbl_v, lv_color_hex((uint32_t)id(theme_voltage)), LV_PART_MAIN);
            lv_obj_set_style_text_font(lbl_v, &lv_font_montserrat_16, LV_PART_MAIN);

            // Current label
            lv_obj_t *lbl_i = lv_label_create(inner);
            snprintf(buf, sizeof(buf), "%.4gA", ii[i]);
            lv_label_set_text(lbl_i, buf);
            lv_obj_set_style_text_color(lbl_i, lv_color_hex((uint32_t)id(theme_current)), LV_PART_MAIN);
            lv_obj_set_style_text_font(lbl_i, &lv_font_montserrat_12, LV_PART_MAIN);

            // Store slot index in user_data for the click handler
            lv_obj_set_user_data(btn, (void*)(intptr_t)i);

            // Click event
            lv_obj_add_event_cb(btn, [](lv_event_t *e) {
              int slot = (int)(intptr_t)lv_obj_get_user_data((lv_obj_t *)lv_event_get_target(e));
              float vv2[12] = {
                id(preset_v_0), id(preset_v_1), id(preset_v_2), id(preset_v_3),
                id(preset_v_4), id(preset_v_5), id(preset_v_6), id(preset_v_7),
                id(preset_v_8), id(preset_v_9), id(preset_v_10), id(preset_v_11)
              };
              float ii2[12] = {
                id(preset_i_0), id(preset_i_1), id(preset_i_2), id(preset_i_3),
                id(preset_i_4), id(preset_i_5), id(preset_i_6), id(preset_i_7),
                id(preset_i_8), id(preset_i_9), id(preset_i_10), id(preset_i_11)
              };
              id(g_ui_active) = true;
              id(g_preset_active) = true;
              id(opendps_select_mode).make_call().set_option("cv").perform();
              id(voltage_number).make_call().set_value(vv2[slot]).perform();
              id(current_number).make_call().set_value(ii2[slot]).perform();
              // Highlight active, dim all others
              lv_obj_t *bar2 = id(preset_bar);
              uint32_t n = lv_obj_get_child_count(bar2);
              for (uint32_t ci = 0; ci < n; ci++) {
                lv_obj_t *child = lv_obj_get_child(bar2, ci);
                lv_obj_set_style_bg_color(child,
                  (int)ci == slot ? lv_color_hex((uint32_t)id(theme_accent) & 0x333333) : lv_color_hex(0x0A0A0A),
                  LV_PART_MAIN);
              }
              id(g_preset_active) = false;
              id(g_ui_active) = false;
            }, LV_EVENT_CLICKED, nullptr);
          }

  # Updates lbl_theme_name text and all 6 swatch bg_colors to preview the current g_theme_scheme.
  # Calls scr_load_scheme to push scheme colors into theme_* globals, then reads them for swatches.
  # Called from theme overlay prev/next buttons.
  - id: scr_update_theme_labels
    then:
      - script.execute: scr_load_scheme
      - lambda: |-
          const char *names[] = { "Custom", "Neon", "Amber", "Ice" };
          int s = id(g_theme_scheme);
          if (s < 0 || s > 3) s = 0;
          lv_label_set_text(id(lbl_theme_name), names[s]);

          lv_obj_set_style_bg_color(id(swatch_accent),   lv_color_hex((uint32_t)id(theme_accent)),   LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(swatch_voltage),  lv_color_hex((uint32_t)id(theme_voltage)),  LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(swatch_current),  lv_color_hex((uint32_t)id(theme_current)),  LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(swatch_bg_main),  lv_color_hex((uint32_t)id(theme_bg_main)),  LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(swatch_bg_panel), lv_color_hex((uint32_t)id(theme_bg_panel)), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(swatch_text_dim), lv_color_hex((uint32_t)id(theme_text_dim)), LV_PART_MAIN);
          // Update per-color swatch squares and hex textareas in the edit rows
          uint32_t tokens[6] = {
            (uint32_t)id(theme_accent),   (uint32_t)id(theme_voltage),
            (uint32_t)id(theme_current),  (uint32_t)id(theme_bg_main),
            (uint32_t)id(theme_bg_panel), (uint32_t)id(theme_text_dim)
          };
          lv_obj_t *swatches[6] = {
            id(ce_swatch_0), id(ce_swatch_1), id(ce_swatch_2),
            id(ce_swatch_3), id(ce_swatch_4), id(ce_swatch_5)
          };
          lv_obj_t *inputs[6] = {
            id(ce_input_0), id(ce_input_1), id(ce_input_2),
            id(ce_input_3), id(ce_input_4), id(ce_input_5)
          };
          char hex[8];
          for (int i = 0; i < 6; i++) {
            lv_obj_set_style_bg_color(swatches[i], lv_color_hex(tokens[i]), LV_PART_MAIN);
            snprintf(hex, sizeof(hex), "%06X", tokens[i] & 0xFFFFFF);
            lv_textarea_set_text(inputs[i], hex);
          }

