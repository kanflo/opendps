            pad_all: 24
            scrollbar_mode: "auto"
            scrollable: true
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER

            widgets:
              # Title
              - label:
                  text: "OpenDPS Controller"
                  text_color: 0x8866FF
                  text_font: montserrat_20
                  width: 552
                  height: 28

              # Divider
              - obj:
                  width: 552
                  height: 1
                  bg_color: 0x333355
                  border_width: 0

              # Info block
