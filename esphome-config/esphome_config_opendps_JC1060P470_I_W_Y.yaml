                                  // Strip leading # if present
                                  if (txt[0] == '#') txt++;
                                  // Must be exactly 6 hex chars
                                  size_t len = strlen(txt);
                                  if (len != 6) {
                                    lv_obj_add_flag(id(overlay_color_kb), LV_OBJ_FLAG_HIDDEN);
                                    return;
                                  }
                                  uint32_t val = (uint32_t)strtol(txt, nullptr, 16);
