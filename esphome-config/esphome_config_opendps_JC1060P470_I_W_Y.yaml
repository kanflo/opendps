interval:
  - interval: 5s
    then:
#      - uart.write:
#          id: ftdi_uart_1
#          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_1
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_2
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_3
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_4
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_5
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_6
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_7
          data: "Hello World !\n"
      - uart.write:
          id: octa_uart_8
          data: "Hello World !\n"
  - interval: 10s
    then:
      - lambda: |-
          bool api_ok = global_api_server != nullptr && global_api_server->is_connected();
          bool mqtt_ok = mqtt::global_mqtt_client != nullptr && mqtt::global_mqtt_client->is_connected();
          bool ha_ok = api_ok || mqtt_ok;
          bool sd_ok = id(sd_card).is_mounted();
          bool usb_ok = id(usb_storage_1).is_mounted();
          bool nfs_ok = id(nfs_share).is_mounted();
          bool dps_ok = id(dps_connected_sensor_id).state;
          id(bs_ha_connected).publish_state(ha_ok);
          id(bs_sd_mounted).publish_state(sd_ok);
          id(bs_usb_mounted).publish_state(usb_ok);
          id(bs_nfs_mounted).publish_state(nfs_ok);
          lv_obj_set_style_text_color(id(lbl_icon_dps), dps_ok ? lv_color_hex(0x39FF14) : lv_color_hex(0x333333), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_icon_ha), ha_ok ? lv_color_hex(0x44AAFF) : lv_color_hex(0x333333), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_icon_sd), sd_ok ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_icon_usb), usb_ok ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_icon_nfs), nfs_ok ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333), LV_PART_MAIN);
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(g_fw_flashing);'
          then:
            - script.execute: fw_poll_status

  # Chart tick: push all series every 250 ms for time-based shifting
  - interval: 250ms
    then:
      - lambda: |-
          lv_chart_set_next_value(id(chart_main), id(ser_v),    id(g_chart_v_val));
          lv_chart_set_next_value(id(chart_main), id(ser_vset), id(g_chart_vset_val));
          lv_chart_set_next_value(id(chart_main), id(ser_i),    id(g_chart_i_val));
          lv_chart_set_next_value(id(chart_main), id(ser_iset), id(g_chart_iset_val));
          lv_chart_set_next_value(id(chart_main), id(ser_p),    id(g_chart_p_val));

