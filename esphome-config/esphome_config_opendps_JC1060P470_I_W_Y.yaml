                            id: btn_cal_refresh
                            width: 100
                            height: 32
                            bg_color: 0x1A2A3A
                            border_color: 0x4499FF
                            border_width: 1
                            radius: 4
                            on_click:
                              - lambda: |-
                                  id(opendps_id).request_calibration_report();
                              - delay: 500ms
                              - lambda: |-
                                  auto &cal = id(opendps_id).get_calibration_data();
                                  char buf[32];
                                  snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_k);   id(input_v_adc_k).publish_state(buf);
                                  snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_c);   id(input_v_adc_c).publish_state(buf);
                                  snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_k);   id(input_v_dac_k).publish_state(buf);
                                  snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_c);   id(input_v_dac_c).publish_state(buf);
                                  snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_k);   id(input_a_adc_k).publish_state(buf);
                                  snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_c);   id(input_a_adc_c).publish_state(buf);
